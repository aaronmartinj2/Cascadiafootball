<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cascadia Football</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#080f09;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh;
    font-family:'Barlow Condensed',sans-serif;
    overflow:hidden; user-select:none;
  }
  h1 { font-family:'Bebas Neue',sans-serif; color:#f0f0e8; font-size:2.2rem; letter-spacing:5px; margin-bottom:2px; }
  h1 span { color:#38a84e; }
  .sub { color:rgba(240,240,232,0.45); font-size:0.8rem; letter-spacing:3px; text-transform:uppercase; margin-bottom:12px; }
  #wrap { position:relative; border:2px solid #38a84e; box-shadow:0 0 50px rgba(56,168,78,0.25); border-radius:3px; overflow:hidden; }
  #gc { display:block; }
  #ui { display:flex; justify-content:center; gap:60px; width:100%; max-width:480px; padding:8px 4px; }
  .stat { text-align:center; }
  .slabel { font-size:0.65rem; letter-spacing:2px; color:rgba(240,240,232,0.4); text-transform:uppercase; }
  .sval { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:#f0f0e8; line-height:1; }
  #ov {
    position:absolute; inset:0; background:rgba(5,12,6,0.92);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
  }
  #ov h2 { font-family:'Bebas Neue',sans-serif; font-size:3.2rem; color:#f0f0e8; letter-spacing:6px; }
  #ov p  { color:rgba(240,240,232,0.6); font-size:1rem; letter-spacing:1px; text-align:center; line-height:1.8; }
  #btn {
    margin-top:8px; padding:13px 44px; background:#38a84e; color:#fff; border:none;
    font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:3px;
    cursor:pointer; border-radius:2px; box-shadow:0 4px 24px rgba(56,168,78,0.45);
    transition:transform 0.1s,box-shadow 0.1s;
  }
  #btn:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(56,168,78,0.65); }
  #btn:active { transform:translateY(0); }
  #fs { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:rgba(240,240,232,0.6); letter-spacing:2px; }
  .hint {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    color:rgba(240,240,232,0.22); font-size:0.68rem; letter-spacing:2px; white-space:nowrap;
  }
</style>
</head>
<body>
<h1>CASCADIA <span>FOOTBALL</span></h1>
<div class="sub">Dribble &amp; Score</div>
<div id="ui">
  <div class="stat"><div class="slabel">Goals</div><div class="sval" id="gd">0</div></div>
  <div class="stat"><div class="slabel">Best</div><div class="sval" id="bd">0</div></div>
</div>
<div id="wrap">
  <canvas id="gc" width="480" height="540"></canvas>
  <div id="ov">
    <h2 id="ot">KICK OFF</h2>
    <p id="om">Use <strong>arrow keys</strong> or <strong>WASD</strong> to dribble.<br>Press <strong>SPACE</strong> to shoot from anywhere!<br>Watch out for the goalkeeper!</p>
    <div id="fs"></div>
    <button id="btn">PLAY</button>
  </div>
  <div class="hint">← → ↑ ↓ &nbsp;|&nbsp; WASD &nbsp;|&nbsp; SPACE to shoot &nbsp;|&nbsp; TOUCH</div>
</div>

<script>
(function() {
  const canvas = document.getElementById('gc');
  const ctx    = canvas.getContext('2d');
  const W = 480, H = 540;

  const gdEl = document.getElementById('gd');
  const bdEl = document.getElementById('bd');
  const ov   = document.getElementById('ov');
  const otEl = document.getElementById('ot');
  const omEl = document.getElementById('om');
  const fsEl = document.getElementById('fs');
  const btn  = document.getElementById('btn');

  // ── Constants ──────────────────────────────
  const GW = 140, GH = 36;
  const GX = W/2 - GW/2, GY = 28;
  const PR = 13, PSPD = 4.2;
  const DCOL = '#cc2200';
  const KEEPER_HALF = GW/2 - 14; // keeper swing radius

  // ── State ──────────────────────────────────
  let mode = 'idle';
  let goals = 0, best = 0;
  let defSpd = 0.9;
  let raf = 0;

  let px, py, shimmer;
  let bx, by, bang;
  let defenders;
  let scrollOff, fieldY;

  // Shooting state: 'none' | 'flying' | 'blocked' | 'loose'
  let shotState;
  let sx, sy, sspin;   // flying ball pos
  let looseBx, loseBy, looseDx, looseDy; // loose ball after block
  let inShootZone;     // player is in shoot zone, show prompt

  let gFlash, gScored;
  let blockFlash;      // brief red flash on block
  let parts;

  // ── Input ──────────────────────────────────
  const K = {};
  document.addEventListener('keydown', e => {
    K[e.key] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  });
  document.addEventListener('keyup', e => { K[e.key] = false; });

  let tx = null, ty = null;
  let tapped = false;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0], r = canvas.getBoundingClientRect();
    tx = (t.clientX - r.left) * (W / r.width);
    ty = (t.clientY - r.top)  * (H / r.height);
    tapped = true;
  }, {passive:false});
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0], r = canvas.getBoundingClientRect();
    tx = (t.clientX - r.left) * (W / r.width);
    ty = (t.clientY - r.top)  * (H / r.height);
  }, {passive:false});
  canvas.addEventListener('touchend', () => { tx = null; ty = null; });

  // ── Keeper helper ──────────────────────────
  function keeperX() {
    return W/2 + Math.sin(Date.now()/1000 * (0.9 + goals*0.08)) * KEEPER_HALF;
  }

  // ── Setup ──────────────────────────────────
  function resetPlayer() {
    px = W/2; py = H-80;
    bx = px+18; by = py+8; bang = 0;
  }

  function mkDef(i) {
    const cx = [W*0.22, W*0.5, W*0.78][i];
    const cy = [H*0.30, H*0.48, H*0.37][i];
    const hw = 90, hh = 68;
    return {
      x:  cx + (Math.random()-0.5)*30,
      y:  cy + (Math.random()-0.5)*20,
      dx: (i%2===0?1:-1) * (1.0+Math.random()*0.5),
      dy: (Math.random()>0.5?1:-1) * (defSpd + Math.random()*0.15),
      x0: cx-hw, x1: cx+hw,
      y0: cy-hh, y1: cy+hh,
      anim: Math.random()*Math.PI*2
    };
  }

  function init() {
    defSpd    = 0.9;
    goals     = 0;
    scrollOff = 0; fieldY = 0;
    gFlash    = 0; gScored = false;
    blockFlash = 0;
    shotState = 'none';
    inShootZone = false;
    parts     = [];
    shimmer   = 0;
    tapped    = false;
    resetPlayer();
    defenders = [0,1,2].map(mkDef);
    updateUI();
  }

  function updateUI() {
    gdEl.textContent = goals;
    bdEl.textContent = best;
  }

  // ── Shoot ──────────────────────────────────
  function shoot() {
    if (shotState !== 'none' || gScored) return;
    if (!inShootZone) return;
    shotState = 'flying';
    sx = px; sy = by; sspin = bang;
  }

  // ── Drawing ────────────────────────────────
  function drawField() {
    const sh = 60, off = scrollOff % (sh*2);
    for (let y = -off-sh; y < H+sh; y += sh*2) {
      ctx.fillStyle = '#2d8a3e'; ctx.fillRect(0, y, W, sh);
      ctx.fillStyle = '#2a7d38'; ctx.fillRect(0, y+sh, W, sh);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(22,0);   ctx.lineTo(22,H);   ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W-22,0); ctx.lineTo(W-22,H); ctx.stroke();
    const cy = H-80 - fieldY*0.8;
    if (cy > -80 && cy < H+80) {
      ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(W/2,cy,55,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(22,cy); ctx.lineTo(W-22,cy); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.35)';
      ctx.beginPath(); ctx.arc(W/2,cy,3,0,Math.PI*2); ctx.fill();
    }
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1.5;
    ctx.strokeRect(W/2-90, GY+GH, 180, 80);
    ctx.strokeRect(W/2-50, GY+GH, 100, 34);
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(W/2, GY+GH+48, 3, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(W/2, GY+GH+48, 55, Math.PI*1.12, Math.PI*1.88); ctx.stroke();
  }

  function drawGoal() {
    ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(GX,GY,GW,GH);
    ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=0.5;
    for (let x=GX; x<=GX+GW; x+=14) { ctx.beginPath(); ctx.moveTo(x,GY); ctx.lineTo(x,GY+GH); ctx.stroke(); }
    for (let y=GY; y<=GY+GH; y+=12) { ctx.beginPath(); ctx.moveTo(GX,y); ctx.lineTo(GX+GW,y); ctx.stroke(); }
    ctx.strokeStyle='#fff'; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(GX, GY+GH); ctx.lineTo(GX, GY);
    ctx.lineTo(GX+GW, GY); ctx.lineTo(GX+GW, GY+GH);
    ctx.stroke();
  }

  function drawKeeper() {
    const kx = keeperX();
    const ky = GY+GH-2;
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(kx,ky+13,12,4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f5c518';
    ctx.beginPath(); ctx.roundRect(kx-10,ky-20,20,24,3); ctx.fill();
    ctx.fillStyle='#111'; ctx.fillRect(kx-10,ky+1,20,10);
    ctx.fillStyle='#f5c518'; ctx.beginPath(); ctx.arc(kx,ky-24,10,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#f5c518'; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(kx-10,ky-10); ctx.lineTo(kx-22,ky-18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(kx+10,ky-10); ctx.lineTo(kx+22,ky-18); ctx.stroke();
  }

  function drawShootPrompt() {
    if (shotState !== 'none' || gScored) return;
    ctx.save();
    ctx.globalAlpha = 0.75 + Math.sin(Date.now()/200)*0.25;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 13px Barlow Condensed,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('SPACE / TAP to shoot', W/2, py - PR - 22);
    ctx.restore();
  }

  function drawPlayer() {
    shimmer += 0.08;
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(px,py+PR+5,PR,5,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#1a3a8c'; ctx.lineWidth=6; ctx.lineCap='round';
    const ls = Math.sin(shimmer*3)*6;
    ctx.beginPath(); ctx.moveTo(px-4,py+5); ctx.lineTo(px-8,py+PR+8+ls); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px+4,py+5); ctx.lineTo(px+8,py+PR+8-ls); ctx.stroke();
    ctx.fillStyle='#38a84e';
    ctx.beginPath(); ctx.roundRect(px-PR+2,py-PR,(PR-2)*2,PR*1.4,4); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.font='bold 10px Barlow Condensed,sans-serif'; ctx.textAlign='center';
    ctx.fillText('10',px,py-1);
    ctx.fillStyle='#e8c49a'; ctx.beginPath(); ctx.arc(px,py-PR-6,10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3a2005'; ctx.beginPath(); ctx.arc(px,py-PR-10,8,Math.PI,0); ctx.fill();
  }

  function drawBall(x, y, a) {
    ctx.save(); ctx.translate(x,y); ctx.rotate(a);
    ctx.fillStyle='#f0f0e8'; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=0.5; ctx.stroke();
    ctx.fillStyle='#1a1a1a';
    [[0,0],[3.8,-2.4],[-3.8,-2.4],[0,4.2],[3.5,2.1],[-3.5,2.1]].forEach(([a2,b2])=>{
      ctx.beginPath(); ctx.arc(a2,b2,2.2,0,Math.PI*2); ctx.fill();
    });
    ctx.restore();
  }

  function drawDef(d) {
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(d.x,d.y+15,12,4,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#555'; ctx.lineWidth=5; ctx.lineCap='round';
    const ls = Math.sin(d.anim*3)*5;
    ctx.beginPath(); ctx.moveTo(d.x-3,d.y+5); ctx.lineTo(d.x-7,d.y+18+ls); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(d.x+3,d.y+5); ctx.lineTo(d.x+7,d.y+18-ls); ctx.stroke();
    ctx.fillStyle=DCOL; ctx.beginPath(); ctx.roundRect(d.x-12,d.y-14,24,22,3); ctx.fill();
    ctx.fillStyle='#e8c49a'; ctx.beginPath(); ctx.arc(d.x,d.y-20,10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#222';    ctx.beginPath(); ctx.arc(d.x,d.y-24,7,Math.PI,0);    ctx.fill();
  }

  function drawParts() {
    parts = parts.filter(p=>p.life>0);
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--;
      ctx.globalAlpha=p.life/p.maxLife;
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;
  }

  function spawnGoalParts() {
    ['#f5c518','#38a84e','#ffffff','#ffdd44','#f0f0e8'].forEach(color=>{
      for (let i=0;i<12;i++){
        const a=Math.random()*Math.PI*2, spd=2+Math.random()*5;
        parts.push({x:W/2,y:GY+GH/2,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,
          r:3+Math.random()*4,color,life:40+Math.random()*30,maxLife:70});
      }
    });
  }

  function drawFlash() {
    if (gFlash>0){
      ctx.fillStyle=`rgba(56,168,78,${gFlash*0.32})`; ctx.fillRect(0,0,W,H);
      if (gFlash>0.5){
        ctx.font='bold 62px Bebas Neue,sans-serif'; ctx.textAlign='center';
        ctx.fillStyle=`rgba(255,255,255,${(gFlash-0.5)*2})`;
        ctx.fillText('GOAL!',W/2,H/2-10);
        ctx.font='600 22px Barlow Condensed,sans-serif';
        ctx.fillStyle=`rgba(245,197,24,${(gFlash-0.5)*2})`;
        ctx.fillText(`GOAL ${goals}`,W/2,H/2+28);
      }
      gFlash -= 0.022;
    }
    if (blockFlash>0){
      ctx.fillStyle=`rgba(220,50,0,${blockFlash*0.28})`; ctx.fillRect(0,0,W,H);
      if (blockFlash>0.5){
        ctx.font='bold 52px Bebas Neue,sans-serif'; ctx.textAlign='center';
        ctx.fillStyle=`rgba(255,255,255,${(blockFlash-0.5)*2})`;
        ctx.fillText('BLOCKED!',W/2,H/2-10);
        ctx.font='600 18px Barlow Condensed,sans-serif';
        ctx.fillStyle=`rgba(255,200,80,${(blockFlash-0.5)*2})`;
        ctx.fillText('Get the ball back!',W/2,H/2+24);
      }
      blockFlash -= 0.028;
    }
  }

  function drawHUD() {
    ctx.fillStyle='rgba(0,0,0,0.42)'; ctx.fillRect(0,H-26,W,26);
    const pct = Math.min(100,Math.floor(fieldY/3.5));
    ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.font='11px Barlow Condensed,sans-serif'; ctx.textAlign='center';
    ctx.fillText(`${pct}% up the pitch`,W/2,H-9);
  }

  // ── Update ─────────────────────────────────
  function update() {
    if (mode !== 'play') return;

    // ── Always move defenders (no matter what shot state) ──
    defenders.forEach(d=>{
      d.x+=d.dx; d.y+=d.dy; d.anim+=0.06;
      if (d.x<=d.x0||d.x>=d.x1){ d.dx*=-1; d.x=Math.max(d.x0,Math.min(d.x1,d.x)); }
      if (d.y<=d.y0||d.y>=d.y1){ d.dy*=-1; d.y=Math.max(d.y0,Math.min(d.y1,d.y)); }
    });

    // ── Flying ball ──
    if (shotState === 'flying') {
      sy -= 9; sspin += 0.4;

      // Check if any defender blocks the flying ball
      for (const d of defenders) {
        const bdx = sx - d.x, bdy = sy - d.y;
        if (Math.sqrt(bdx*bdx + bdy*bdy) < 18) {
          // Defender blocks the shot - ball bounces off them loosely
          shotState = 'loose';
          looseBx = sx;
          loseBy  = sy;
          looseDx = (sx - d.x) * 0.2 + (Math.random()-0.5)*3;
          looseDy = 2 + Math.random()*2; // bounces downward toward player
          blockFlash = 1.0;
          return;
        }
      }

      // Has ball reached goal line area?
      if (sy <= GY+GH+4) {
        const kx = keeperX();
        const ballInGoal = sx > GX+6 && sx < GX+GW-6;
        const keeperReach = 22;
        const blocked = ballInGoal && Math.abs(sx - kx) < keeperReach;

        if (blocked) {
          shotState = 'loose';
          looseBx = sx;
          loseBy  = GY + GH + 10;
          looseDx = (sx - kx) * 0.18 + (Math.random()-0.5)*2;
          looseDy = 3 + Math.random()*2;
          blockFlash = 1.0;
        } else if (ballInGoal) {
          // GOAL!
          goals++; if (goals>best) best=goals;
          gFlash=1.0; gScored=true; shotState='none';
          defSpd += 0.25;
          spawnGoalParts(); updateUI();
          setTimeout(nextRound, 2000);
        } else {
          // Wide/high - ball gone, reset to player
          shotState = 'none';
          bx = px+18; by = py+8;
        }
      } else if (sy < GY-14) {
        shotState = 'none';
        bx = px+18; by = py+8;
      }
      return; // skip player movement while ball is flying
    }

    // ── Loose ball after block ──
    if (shotState === 'loose') {
      looseBx += looseDx;
      loseBy  += looseDy;
      looseDy += 0.2;
      looseDx *= 0.97;
      if (looseBx < 30 || looseBx > W-30) looseDx *= -1;
      // Player picks up loose ball
      const pdx = px - looseBx, pdy = py - loseBy;
      if (Math.sqrt(pdx*pdx+pdy*pdy) < PR+10) {
        shotState = 'none';
        bx = looseBx; by = loseBy;
      }
      // Ball scrolls off bottom - reset to player
      if (loseBy > H+20) {
        shotState = 'none';
        bx = px+18; by = py+8;
      }
    }

    // ── Player movement ──
    let mdx=0, mdy=0;
    if (K['ArrowLeft'] ||K['a']||K['A']) mdx-=1;
    if (K['ArrowRight']||K['d']||K['D']) mdx+=1;
    if (K['ArrowUp']   ||K['w']||K['W']) mdy-=1;
    if (K['ArrowDown'] ||K['s']||K['S']) mdy+=1;
    if (tx!==null && ty!==null){
      const tdx=tx-px, tdy=ty-py, dist=Math.sqrt(tdx*tdx+tdy*tdy);
      if (dist>10){ mdx=tdx/dist; mdy=tdy/dist; }
    }
    if (mdx!==0&&mdy!==0){ mdx*=0.707; mdy*=0.707; }

    const moving = mdx!==0||mdy!==0;
    px = Math.max(34, Math.min(W-34, px+mdx*PSPD));
    py = Math.max(20, Math.min(H-20, py+mdy*PSPD));

    // Ball follows player (only when not loose)
    if (shotState !== 'loose') {
      bx += (px+18-bx)*0.35;
      by += (py+8 -by)*0.35;
      if (moving) bang += mdx*0.18 + Math.abs(mdy)*0.12;
    }

    // Scroll
    if (py < H*0.42){
      const spd=(H*0.42-py)*0.09;
      scrollOff+=spd; fieldY+=spd; py+=spd*0.55;
      defenders.forEach(d=>{ d.y+=spd; d.y0+=spd; d.y1+=spd; });
      if (shotState==='loose') loseBy+=spd;
    }

    // Shoot zone = anywhere (just not while a goal celebration is happening)
    inShootZone = !gScored;

    // Spacebar or tap to shoot
    if ((K[' '] || tapped) && shotState === 'none' && !gScored) {
      shoot();
    }
    tapped = false;

    // ── Collision ──
    for (const d of defenders){
      const ex=px-d.x, ey=py-d.y;
      if (Math.sqrt(ex*ex+ey*ey)<PR+13){ gameOver(); return; }
    }
  }

  function nextRound(){
    gScored=false; gFlash=0; shotState='none'; blockFlash=0;
    scrollOff=0; fieldY=0; inShootZone=false;
    resetPlayer();
    defenders.forEach(d=>{
      const hh=68;
      if (d.y1>H-40 || d.y0<60){
        const midY = H*0.3 + Math.random()*H*0.25;
        d.y0=midY-hh; d.y1=midY+hh;
        d.y=Math.max(d.y0,Math.min(d.y1,d.y));
      }
      const sign=d.dy>=0?1:-1;
      d.dy=sign*Math.min(Math.abs(d.dy)+0.1, 4.0);
    });
  }

  function gameOver(){
    mode='dead'; cancelAnimationFrame(raf);
    otEl.textContent='TACKLED!';
    omEl.textContent=`You were brought down with ${goals} goal${goals!==1?'s':''} scored.`;
    fsEl.textContent=best>0?`Best: ${best} goals`:'';
    btn.textContent='TRY AGAIN';
    ov.style.display='flex';
  }

  // ── Loop ───────────────────────────────────
  function loop(){
    update();
    drawField(); drawGoal();
    if (!gScored) drawKeeper();
    defenders.forEach(drawDef);

    // Draw ball depending on state
    if (shotState==='flying') {
      drawBall(sx,sy,sspin);
      drawBall(bx,by,bang); // ball still on player during shot illusion - hide it
    } else if (shotState==='loose') {
      drawBall(looseBx,loseBy,bang);
      // no ball on player
    } else {
      drawBall(bx,by,bang);
    }

    drawShootPrompt();
    drawPlayer(); drawParts(); drawFlash(); drawHUD();
    raf=requestAnimationFrame(loop);
  }

  btn.addEventListener('click',()=>{
    ov.style.display='none';
    init(); mode='play'; loop();
  });

  // Static preview
  drawField(); drawGoal(); drawKeeper();
  drawBall(W/2+18, H-72, 0); drawPlayer();
})();
</script>
